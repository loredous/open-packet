name: Build and Publish Documentation

on:
  release:
    types: [published]
  workflow_dispatch:  # Allow manual trigger for testing

permissions:
  contents: write
  pages: write
  id-token: write

jobs:
  build-docs:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0  # Fetch full history for git info in Hugo

      - name: Set up Hugo
        uses: peaceiris/actions-hugo@v3
        with:
          hugo-version: "latest"
          extended: true

      - name: Build Hugo site
        run: |
          cd docs/hugo
          hugo --minify --baseURL "https://loredous.github.io/open-packet/"

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: docs/hugo/public

  deploy-pages:
    needs: build-docs
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

  export-pdf:
    needs: build-docs
    runs-on: ubuntu-latest
    if: github.event_name == 'release'
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install pandoc and LaTeX for PDF export
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y pandoc texlive-xetex texlive-fonts-recommended texlive-plain-generic

      - name: Combine markdown files into PDF
        run: |
          # Collect all content markdown files in order
          find docs/hugo/content -name "*.md" \
            | grep -v "_index.md" \
            | sort \
            | xargs pandoc \
              --from=markdown+yaml_metadata_block \
              --to=pdf \
              --pdf-engine=xelatex \
              --toc \
              --toc-depth=2 \
              -V title="open-packet Documentation" \
              -V author="open-packet contributors" \
              -V date="$(date '+%Y-%m-%d')" \
              -V geometry:margin=1in \
              -V fontsize=11pt \
              -o open-packet-docs.pdf

      - name: Upload PDF to release
        uses: softprops/action-gh-release@v2
        with:
          files: open-packet-docs.pdf
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
