name: Radio Net Log
category: General Forms
subject_template: "{{ Title }} Radio Net Log - {{ Incident_Name }}"
body_template: |
  Radio Net Log
  ---------
  1. Incident Name: {{ Incident_Name }}
  2. Operational Period:
     2a. Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     2b. Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}
  3. Name/Position (NCS): {{ NCS }}
  4. Name/Position (Backup): {{ BackupNCS }}

  -----
  #   Call Sign   Location   Check in   Check out   Comments
  1   {{ A1 }}    {{ A2 }}   {{ A3 }}   {{ A4 }}    {{ A5 }}
  2   {{ B1 }}    {{ B2 }}   {{ B3 }}   {{ B4 }}    {{ B5 }}
  3   {{ C1 }}    {{ C2 }}   {{ C3 }}   {{ C4 }}    {{ C5 }}
  4   {{ D1 }}    {{ D2 }}   {{ D3 }}   {{ D4 }}    {{ D5 }}
  5   {{ E1 }}    {{ E2 }}   {{ E3 }}   {{ E4 }}    {{ E5 }}
  6   {{ F1 }}    {{ F2 }}   {{ F3 }}   {{ F4 }}    {{ F5 }}
  7   {{ G1 }}    {{ G2 }}   {{ G3 }}   {{ G4 }}    {{ G5 }}
  8   {{ H1 }}    {{ H2 }}   {{ H3 }}   {{ H4 }}    {{ H5 }}
  9   {{ I1 }}    {{ I2 }}   {{ I3 }}   {{ I4 }}    {{ I5 }}
  10  {{ J1 }}    {{ J2 }}   {{ J3 }}   {{ J4 }}    {{ J5 }}

  ---------------------------------------------
  Comments or Additional Information:
  {{ Comments }}

fields:
  - name: Title
    label: "Net Name/Title"
    type: text
    required: true
    max_length: 40

  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateFrom
    label: "2a. Date From"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "2a. Date To"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "2b. Time From"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "2b. Time To"
    type: text
    required: true
    max_length: 9

  - name: NCS
    label: "3. NCS Name/Position"
    type: text
    required: true
    max_length: 60

  - name: BackupNCS
    label: "4. Backup NCS Name/Position"
    type: text
    max_length: 60

  - name: A1
    label: "Station 1 - Call Sign"
    type: text
