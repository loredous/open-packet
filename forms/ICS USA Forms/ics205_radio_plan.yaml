name: ICS 205 Radio Plan
category: ICS USA Forms
subject_template: "ICS 205 - {{ Incident_Name }} - {{ ActivityDateTime2 }}"
body_template: |
  ICS 205 INCIDENT RADIO COMMUNICATIONS PLAN

  1. Incident Name: {{ Incident_Name }}
  2. Date & Time Prepared: {{ ActivityDateTime2 }}

  3. Operational Period:
  From: {{ DateFrom }} {{ TimeFrom }}
  To:   {{ DateTo }} {{ TimeTo }}

  4. BASIC RADIO CHANNEL USE:

  ZONE GRP: {{ ZoneGrp1 }}  CH#: {{ Ch1 }}  FUNCTION: {{ Function1 }}
  CH NAME: {{ ChannelName1 }}  ASSIGNMENT: {{ Assignment1 }}
  RX FREQ: {{ RX1 }}  TX FREQ: {{ TX1 }}  MODE: {{ Mode1 }}
  REMARKS: {{ Remarks1 }}

  ZONE GRP: {{ ZoneGrp2 }}  CH#: {{ Ch2 }}  FUNCTION: {{ Function2 }}
  CH NAME: {{ ChannelName2 }}  ASSIGNMENT: {{ Assignment2 }}
  RX FREQ: {{ RX2 }}  TX FREQ: {{ TX2 }}  MODE: {{ Mode2 }}
  REMARKS: {{ Remarks2 }}

  ZONE GRP: {{ ZoneGrp3 }}  CH#: {{ Ch3 }}  FUNCTION: {{ Function3 }}
  CH NAME: {{ ChannelName3 }}  ASSIGNMENT: {{ Assignment3 }}
  RX FREQ: {{ RX3 }}  TX FREQ: {{ TX3 }}  MODE: {{ Mode3 }}
  REMARKS: {{ Remarks3 }}

  ZONE GRP: {{ ZoneGrp4 }}  CH#: {{ Ch4 }}  FUNCTION: {{ Function4 }}
  CH NAME: {{ ChannelName4 }}  ASSIGNMENT: {{ Assignment4 }}
  RX FREQ: {{ RX4 }}  TX FREQ: {{ TX4 }}  MODE: {{ Mode4 }}
  REMARKS: {{ Remarks4 }}

  ZONE GRP: {{ ZoneGrp5 }}  CH#: {{ Ch5 }}  FUNCTION: {{ Function5 }}
  CH NAME: {{ ChannelName5 }}  ASSIGNMENT: {{ Assignment5 }}
  RX FREQ: {{ RX5 }}  TX FREQ: {{ TX5 }}  MODE: {{ Mode5 }}
  REMARKS: {{ Remarks5 }}

  --------------------------------------
  5. Special Instructions:
  {{ SpecialInstructions }}

  --------------------------------------
  6. Approved by: {{ PreparedName }}  Date/Time: {{ ActivityDateTime1 }}
  IAP Page: {{ IAP_Page }}

fields:
