name: ICS 260 Resource Order
category: ICS USA Forms
subject_template: "ICS 260 - {{ IncidentName }} - {{ DateTimePrepared }}"
body_template: |
  RESOURCE ORDER (ICS 260)

  1. Incident Name: {{ IncidentName }}
  2. Incident Number: {{ IncidentNumber }}
  3. Date/Time Prepared: {{ DateTimePrepared }}
  4. Operational Period:
     Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}
  5. Ordering Manager: {{ OrderingManager }}

  6. RESOURCE ORDERS:

  Order#  Request#  Kind/Type                   Qty  Reporting Location       Report Date/Time     ETA                  Remarks
  {{ Order1Number }}  {{ Order1RequestNumber }}  {{ Order1KindType }}  {{ Order1Quantity }}  {{ Order1ReportingLocation }}  {{ Order1ReportDateTime }}  {{ Order1ETA }}  {{ Order1Remarks }}
  {{ Order2Number }}  {{ Order2RequestNumber }}  {{ Order2KindType }}  {{ Order2Quantity }}  {{ Order2ReportingLocation }}  {{ Order2ReportDateTime }}  {{ Order2ETA }}  {{ Order2Remarks }}
  {{ Order3Number }}  {{ Order3RequestNumber }}  {{ Order3KindType }}  {{ Order3Quantity }}  {{ Order3ReportingLocation }}  {{ Order3ReportDateTime }}  {{ Order3ETA }}  {{ Order3Remarks }}
  {{ Order4Number }}  {{ Order4RequestNumber }}  {{ Order4KindType }}  {{ Order4Quantity }}  {{ Order4ReportingLocation }}  {{ Order4ReportDateTime }}  {{ Order4ETA }}  {{ Order4Remarks }}
  {{ Order5Number }}  {{ Order5RequestNumber }}  {{ Order5KindType }}  {{ Order5Quantity }}  {{ Order5ReportingLocation }}  {{ Order5ReportDateTime }}  {{ Order5ETA }}  {{ Order5Remarks }}
  {{ Order6Number }}  {{ Order6RequestNumber }}  {{ Order6KindType }}  {{ Order6Quantity }}  {{ Order6ReportingLocation }}  {{ Order6ReportDateTime }}  {{ Order6ETA }}  {{ Order6Remarks }}

  Finance/Admin Section Chief: {{ FinanceAdminChief }}

  Prepared by: {{ PreparedBy }}
  Position/Title: {{ PrepPosition }}
  Date/Time: {{ PrepDateTime }}

fields:
  - name: IncidentName
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: IncidentNumber
    label: "2. Incident Number"
    type: text
    max_length: 20

  - name: DateTimePrepared
    label: "3. Date/Time Prepared"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: DateFrom
    label: "4. Operational Period - Date From"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "4. Operational Period - Date To"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "4. Operational Period - Time From"
    description: "e.g. 0800"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "4. Operational Period - Time To"
    description: "e.g. 2000"
    type: text
    required: true
    max_length: 9

  - name: OrderingManager
    label: "5. Ordering Manager"
    type: text
    required: true
