name: ICS 260 Resource Order
category: ICS USA Forms
subject_template: "ICS 260 - {{ Incident_Name }} - Order #{{ Order_Number }}"
body_template: |
  ICS 260 RESOURCE ORDER

  1. Incident Name: {{ Incident_Name }}
  2. Incident Number: {{ Incident_Number }}
  3. Order Number: {{ Order_Number }}
  4. Date/Time of Request: {{ Request_DateTime }}
  5. Priority: {{ Priority }}
  6. Requested by: {{ Requested_By }}  Position: {{ Requested_By_Position }}
  7. Date/Time Needed: {{ Needed_DateTime }}
  8. Delivery/Reporting Location: {{ Delivery_Location }}

  ---------------------------------------------------------------
  9. RESOURCE ORDER ITEMS:

  QTY  KIND/TYPE       DESCRIPTION
  {{ Qty1 }}  {{ KindType1 }}
  Description: {{ Description1 }}
  Reporting Location: {{ ReportLocation1 }}  Reporting Date/Time: {{ ReportDateTime1 }}
  ETA: {{ ETA1 }}  Order #: {{ ItemOrderNo1 }}
  Notes: {{ ItemNotes1 }}

  {{ Qty2 }}  {{ KindType2 }}
  Description: {{ Description2 }}
  Reporting Location: {{ ReportLocation2 }}  Reporting Date/Time: {{ ReportDateTime2 }}
  ETA: {{ ETA2 }}  Order #: {{ ItemOrderNo2 }}
  Notes: {{ ItemNotes2 }}

  {{ Qty3 }}  {{ KindType3 }}
  Description: {{ Description3 }}
  Reporting Location: {{ ReportLocation3 }}  Reporting Date/Time: {{ ReportDateTime3 }}
  ETA: {{ ETA3 }}  Order #: {{ ItemOrderNo3 }}
  Notes: {{ ItemNotes3 }}

  {{ Qty4 }}  {{ KindType4 }}
  Description: {{ Description4 }}
  Reporting Location: {{ ReportLocation4 }}  Reporting Date/Time: {{ ReportDateTime4 }}
  ETA: {{ ETA4 }}  Order #: {{ ItemOrderNo4 }}
  Notes: {{ ItemNotes4 }}

  {{ Qty5 }}  {{ KindType5 }}
  Description: {{ Description5 }}
  Reporting Location: {{ ReportLocation5 }}  Reporting Date/Time: {{ ReportDateTime5 }}
  ETA: {{ ETA5 }}  Order #: {{ ItemOrderNo5 }}
  Notes: {{ ItemNotes5 }}

  ---------------------------------------------------------------
  LOGISTICS

  10. Logistics Order #: {{ Logistics_Order_Number }}
  11. Confirmed by: {{ Confirmed_By }}
  12. Date/Time Confirmed: {{ Confirmed_DateTime }}
  13. Logistics Notes: {{ Logistics_Notes }}

  ---------------------------------------------------------------
  FINANCE

  14. Finance Approval: {{ Finance_Approval }}
  15. Date/Time: {{ Finance_DateTime }}

  ---------------------------------------------------------------
  Prepared by: {{ PreparedName }}
  Date/Time: {{ PreparedDateTime }}

fields:
  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: Incident_Number
    label: "2. Incident Number"
    type: text
    max_length: 20

  - name: Order_Number
    label: "3. Order Number"
    type: text
    required: true
    max_length: 20

  - name: Request_DateTime
    label: "4. Date/Time of Request"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: Priority
    label: "5. Priority"
    type: text
    choices:
      - Routine
      - Priority
      - Immediate
      - Critical
    required: true

  - name: Requested_By
    label: "6. Requested by (Name)"
    type: text
    required: true
    max_length: 60

  - name: Requested_By_Position
    label: "6. Requested by (Position/Section)"
    type: text
    max_length: 40

  - name: Needed_DateTime
    label: "7. Date/Time Needed"
    description: "e.g. 2025-01-16 0800"
    type: text
    max_length: 20

  - name: Delivery_Location
    label: "8. Delivery/Reporting Location"
    type: textarea

  - name: Qty1
    label: "Item 1 - Quantity"
    type: text
    max_length: 10

