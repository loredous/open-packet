name: ICS 218 Support Vehicle/Equipment Inventory
category: ICS USA Forms
subject_template: "ICS 218 - {{ IncidentName }} - {{ DateTimePrepared }}"
body_template: |
  ICS 218 SUPPORT VEHICLE/EQUIPMENT INVENTORY

  1. Incident Name: {{ IncidentName }}
  2. Date/Time Prepared: {{ DateTimePrepared }}

  3. Operational Period:
  From: {{ DateFrom }} {{ TimeFrom }}
  To:   {{ DateTo }} {{ TimeTo }}

  -------------------------------------------------------------------
  4. VEHICLE/EQUIPMENT INVENTORY:

  VEHICLE 1:
  Type: {{ VehicleType1 }}  Make/Model: {{ VehicleMakeModel1 }}  Year: {{ VehicleYear1 }}
  License/Plate: {{ VehicleLicense1 }}  Agency: {{ VehicleAgency1 }}
  Home Base: {{ VehicleHomeBase1 }}

  VEHICLE 2:
  Type: {{ VehicleType2 }}  Make/Model: {{ VehicleMakeModel2 }}  Year: {{ VehicleYear2 }}
  License/Plate: {{ VehicleLicense2 }}  Agency: {{ VehicleAgency2 }}
  Home Base: {{ VehicleHomeBase2 }}

  VEHICLE 3:
  Type: {{ VehicleType3 }}  Make/Model: {{ VehicleMakeModel3 }}  Year: {{ VehicleYear3 }}
  License/Plate: {{ VehicleLicense3 }}  Agency: {{ VehicleAgency3 }}
  Home Base: {{ VehicleHomeBase3 }}

  VEHICLE 4:
  Type: {{ VehicleType4 }}  Make/Model: {{ VehicleMakeModel4 }}  Year: {{ VehicleYear4 }}
  License/Plate: {{ VehicleLicense4 }}  Agency: {{ VehicleAgency4 }}
  Home Base: {{ VehicleHomeBase4 }}

  VEHICLE 5:
  Type: {{ VehicleType5 }}  Make/Model: {{ VehicleMakeModel5 }}  Year: {{ VehicleYear5 }}
  License/Plate: {{ VehicleLicense5 }}  Agency: {{ VehicleAgency5 }}
  Home Base: {{ VehicleHomeBase5 }}

  VEHICLE 6:
  Type: {{ VehicleType6 }}  Make/Model: {{ VehicleMakeModel6 }}  Year: {{ VehicleYear6 }}
  License/Plate: {{ VehicleLicense6 }}  Agency: {{ VehicleAgency6 }}
  Home Base: {{ VehicleHomeBase6 }}

  -------------------------------------------------------------------
  Prepared by: {{ PreparedBy }}
  Position/Title: {{ PreparedTitle }}
  Date/Time: {{ PreparedDateTime }}

fields:
