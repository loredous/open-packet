    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimePrepared
    label: "2. Date/Time Prepared"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: DateFrom
    label: "3. Op Period - Date From"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "3. Op Period - Time From"
