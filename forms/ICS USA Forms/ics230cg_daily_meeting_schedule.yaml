name: ICS 230CG Daily Meeting Schedule
category: ICS USA Forms
subject_template: "ICS 230CG - {{ IncidentName }} - {{ DateFrom }}"
body_template: |
  DAILY MEETING SCHEDULE (ICS 230CG)

  1. Incident Name: {{ IncidentName }}
  2. Operational Period:
     Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}

  3. MEETING SCHEDULE:

  Time          Meeting                              Location                 Attendees
  {{ Meeting1Time }}  {{ Meeting1Name }}  {{ Meeting1Location }}  {{ Meeting1Attendees }}
  {{ Meeting2Time }}  {{ Meeting2Name }}  {{ Meeting2Location }}  {{ Meeting2Attendees }}
  {{ Meeting3Time }}  {{ Meeting3Name }}  {{ Meeting3Location }}  {{ Meeting3Attendees }}
  {{ Meeting4Time }}  {{ Meeting4Name }}  {{ Meeting4Location }}  {{ Meeting4Attendees }}
  {{ Meeting5Time }}  {{ Meeting5Name }}  {{ Meeting5Location }}  {{ Meeting5Attendees }}
  {{ Meeting6Time }}  {{ Meeting6Name }}  {{ Meeting6Location }}  {{ Meeting6Attendees }}
  {{ Meeting7Time }}  {{ Meeting7Name }}  {{ Meeting7Location }}  {{ Meeting7Attendees }}
  {{ Meeting8Time }}  {{ Meeting8Name }}  {{ Meeting8Location }}  {{ Meeting8Attendees }}

  Prepared by: {{ PreparedBy }}
  Position/Title: {{ PrepPosition }}
  Date/Time: {{ PrepDateTime }}

fields:
  - name: IncidentName
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateFrom
    label: "2. Operational Period - Date From"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "2. Operational Period - Date To"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "2. Operational Period - Time From"
    description: "e.g. 0800"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "2. Operational Period - Time To"
    description: "e.g. 2000"
    type: text
    required: true
