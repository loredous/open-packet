name: ICS 206 Medical Plan
category: ICS USA Forms
subject_template: "ICS 206 - {{ Incident_Name }} - {{ DateTimePrepared }}"
body_template: |
  ICS 206 MEDICAL PLAN

  1. Incident Name: {{ Incident_Name }}
  2. Date/Time Prepared: {{ DateTimePrepared }}

  3. Operational Period:
  From: {{ DateFrom }} {{ TimeFrom }}
  To:   {{ DateTo }} {{ TimeTo }}

  4. MEDICAL AID STATIONS:

  NAME: {{ AidStation1 }}  LOCATION: {{ AidLocation1 }}
  PARAMEDICS ON SITE: {{ AidParamedics1 }}  RADIO CHANNEL: {{ AidRadio1 }}  PHONE: {{ AidPhone1 }}

  NAME: {{ AidStation2 }}  LOCATION: {{ AidLocation2 }}
  PARAMEDICS ON SITE: {{ AidParamedics2 }}  RADIO CHANNEL: {{ AidRadio2 }}  PHONE: {{ AidPhone2 }}

  NAME: {{ AidStation3 }}  LOCATION: {{ AidLocation3 }}
  PARAMEDICS ON SITE: {{ AidParamedics3 }}  RADIO CHANNEL: {{ AidRadio3 }}  PHONE: {{ AidPhone3 }}

  --------------------------------------------------
  5. TRANSPORTATION:

  A. AMBULANCE SERVICES:

  NAME: {{ Ambulance1 }}  LOCATION: {{ AmbulanceLocation1 }}
  LEVEL: {{ AmbulanceLevel1 }}  PHONE: {{ AmbulancePhone1 }}

  NAME: {{ Ambulance2 }}  LOCATION: {{ AmbulanceLocation2 }}
  LEVEL: {{ AmbulanceLevel2 }}  PHONE: {{ AmbulancePhone2 }}

  --------------------------------------------------
  6. HOSPITALS:

  NAME: {{ Hospital1 }}
  ADDRESS: {{ HospitalAddress1 }}
  TRAUMA CENTER: {{ HospitalTrauma1 }}  BURN CENTER: {{ HospitalBurn1 }}  HELIPAD: {{ HospitalHelipad1 }}
  TRAVEL TIME: {{ HospitalTravelTime1 }}  PHONE: {{ HospitalPhone1 }}

  NAME: {{ Hospital2 }}
  ADDRESS: {{ HospitalAddress2 }}
  TRAUMA CENTER: {{ HospitalTrauma2 }}  BURN CENTER: {{ HospitalBurn2 }}  HELIPAD: {{ HospitalHelipad2 }}
  TRAVEL TIME: {{ HospitalTravelTime2 }}  PHONE: {{ HospitalPhone2 }}

  --------------------------------------------------
  7. Special Medical Procedures/Notes:
  {{ SpecialProcedures }}

  --------------------------------------------------
  Prepared by (Medical Unit Leader): {{ PreparedName }}
  Date/Time: {{ PreparedDateTime }}

  Approved by (Safety Officer): {{ ApprovedName }}
  Date/Time: {{ ApprovedDateTime }}

  IAP Page: {{ IAP_Page }}

fields:
  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimePrepared
    label: "2. Date/Time Prepared"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: DateFrom
    label: "3. Op Period - Date From"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "3. Op Period - Time From"
    type: text
    required: true
    max_length: 9

  - name: DateTo
    label: "3. Op Period - Date To"
    type: text
    required: true
    max_length: 12

  - name: TimeTo
    label: "3. Op Period - Time To"
    type: text
    required: true
