name: ICS 233CG Incident Open Action Tracker
category: ICS USA Forms
subject_template: "ICS 233CG - {{ IncidentName }} - {{ DateFrom }}"
body_template: |
  INCIDENT OPEN ACTION TRACKER (ICS 233CG)

  1. Incident Name: {{ IncidentName }}
  2. Operational Period:
     Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}

  3. OPEN ACTION ITEMS:

  Item  Date/Time Assigned   Action Description            Responsible Party      Due Date/Time        Status       Remarks
  1     {{ Action1DateTime }}  {{ Action1Description }}  {{ Action1Responsible }}  {{ Action1Due }}  {{ Action1Status }}  {{ Action1Remarks }}
  2     {{ Action2DateTime }}  {{ Action2Description }}  {{ Action2Responsible }}  {{ Action2Due }}  {{ Action2Status }}  {{ Action2Remarks }}
  3     {{ Action3DateTime }}  {{ Action3Description }}  {{ Action3Responsible }}  {{ Action3Due }}  {{ Action3Status }}  {{ Action3Remarks }}
  4     {{ Action4DateTime }}  {{ Action4Description }}  {{ Action4Responsible }}  {{ Action4Due }}  {{ Action4Status }}  {{ Action4Remarks }}
  5     {{ Action5DateTime }}  {{ Action5Description }}  {{ Action5Responsible }}  {{ Action5Due }}  {{ Action5Status }}  {{ Action5Remarks }}
  6     {{ Action6DateTime }}  {{ Action6Description }}  {{ Action6Responsible }}  {{ Action6Due }}  {{ Action6Status }}  {{ Action6Remarks }}
  7     {{ Action7DateTime }}  {{ Action7Description }}  {{ Action7Responsible }}  {{ Action7Due }}  {{ Action7Status }}  {{ Action7Remarks }}
  8     {{ Action8DateTime }}  {{ Action8Description }}  {{ Action8Responsible }}  {{ Action8Due }}  {{ Action8Status }}  {{ Action8Remarks }}
  9     {{ Action9DateTime }}  {{ Action9Description }}  {{ Action9Responsible }}  {{ Action9Due }}  {{ Action9Status }}  {{ Action9Remarks }}
  10    {{ Action10DateTime }}  {{ Action10Description }}  {{ Action10Responsible }}  {{ Action10Due }}  {{ Action10Status }}  {{ Action10Remarks }}

  Prepared by: {{ PreparedBy }}
  Position/Title: {{ PrepPosition }}
  Date/Time: {{ PrepDateTime }}

fields:
  - name: IncidentName
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateFrom
    label: "2. Operational Period - Date From"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "2. Operational Period - Date To"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "2. Operational Period - Time From"
    description: "e.g. 0800"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "2. Operational Period - Time To"
    description: "e.g. 2000"
    type: text
    required: true
    max_length: 9

  - name: Action1DateTime
    label: "Action 1 - Date/Time Assigned"
    description: "e.g. 2025-01-15 0830"
    type: text
    max_length: 20

  - name: Action1Description
    label: "Action 1 - Action Description"
    type: text
    max_length: 80

  - name: Action1Responsible
    label: "Action 1 - Responsible Party"
    type: text
    max_length: 40

  - name: Action1Due
    label: "Action 1 - Due Date/Time"
    description: "e.g. 2025-01-15 1200"
    type: text
    max_length: 20

  - name: Action1Status
    label: "Action 1 - Status"
    type: text
    choices: ["Open", "In Progress", "Closed"]
    max_length: 15

  - name: Action1Remarks
    label: "Action 1 - Remarks"
    type: text
    max_length: 60

