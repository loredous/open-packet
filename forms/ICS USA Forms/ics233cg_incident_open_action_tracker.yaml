name: ICS 233CG Incident Open Action Tracker
category: ICS USA Forms
subject_template: "ICS 233CG - {{ Incident_Name }} - {{ DateTimeFrom }}"
body_template: |
  ICS 233CG INCIDENT OPEN ACTION TRACKER

  1. Incident Name: {{ Incident_Name }}
  2. Operational Period:
     From: {{ DateTimeFrom }}
     To:   {{ DateTimeTo }}

  ---------------------------------------------------------------
  3. OPEN ACTION ITEMS:

  #  ACTION REQUIRED         RESPONSIBLE PARTY   DUE DATE/TIME   STATUS
  {{ No1 }}  {{ Action1 }}
     Responsible: {{ Responsible1 }}  Due: {{ DueDateTime1 }}  Status: {{ Status1 }}
     Notes: {{ Notes1 }}

  {{ No2 }}  {{ Action2 }}
     Responsible: {{ Responsible2 }}  Due: {{ DueDateTime2 }}  Status: {{ Status2 }}
     Notes: {{ Notes2 }}

  {{ No3 }}  {{ Action3 }}
     Responsible: {{ Responsible3 }}  Due: {{ DueDateTime3 }}  Status: {{ Status3 }}
     Notes: {{ Notes3 }}

  {{ No4 }}  {{ Action4 }}
     Responsible: {{ Responsible4 }}  Due: {{ DueDateTime4 }}  Status: {{ Status4 }}
     Notes: {{ Notes4 }}

  {{ No5 }}  {{ Action5 }}
     Responsible: {{ Responsible5 }}  Due: {{ DueDateTime5 }}  Status: {{ Status5 }}
     Notes: {{ Notes5 }}

  {{ No6 }}  {{ Action6 }}
     Responsible: {{ Responsible6 }}  Due: {{ DueDateTime6 }}  Status: {{ Status6 }}
     Notes: {{ Notes6 }}

  {{ No7 }}  {{ Action7 }}
     Responsible: {{ Responsible7 }}  Due: {{ DueDateTime7 }}  Status: {{ Status7 }}
     Notes: {{ Notes7 }}

  {{ No8 }}  {{ Action8 }}
     Responsible: {{ Responsible8 }}  Due: {{ DueDateTime8 }}  Status: {{ Status8 }}
     Notes: {{ Notes8 }}

  ---------------------------------------------------------------
  Prepared by: {{ PreparedName }}
  Position/Title: {{ PreparedPosition }}
  Date/Time: {{ PreparedDateTime }}

fields:
  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimeFrom
    label: "2. Operational Period - From"
    description: "e.g. 2025-01-15 0800"
    type: text
    required: true
    max_length: 20

  - name: DateTimeTo
    label: "2. Operational Period - To"
    description: "e.g. 2025-01-15 2000"
    type: text
    required: true
    max_length: 20

  - name: No1
    label: "Item 1 - Item #"
    type: text
    max_length: 5

  - name: Action1
    label: "Item 1 - Action Required"
    type: textarea

  - name: Responsible1
    label: "Item 1 - Responsible Party"
    type: text
    max_length: 60

  - name: DueDateTime1
    label: "Item 1 - Due Date/Time"
    type: text
    max_length: 20

  - name: Status1
    label: "Item 1 - Status"
    type: text
    choices:
      - Open
      - In Progress
      - Closed
