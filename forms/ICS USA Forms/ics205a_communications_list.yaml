name: ICS 205A Communications List
category: ICS USA Forms
subject_template: "ICS 205A - {{ Incident_Name }} - {{ DateTimePrepared }}"
body_template: |
  ICS 205A COMMUNICATIONS LIST

  1. Incident Name: {{ Incident_Name }}
  2. Date/Time Prepared: {{ DateTimePrepared }}

  3. Operational Period:
  From: {{ DateFrom }} {{ TimeFrom }}
  To:   {{ DateTo }} {{ TimeTo }}

  4. BASIC LOCAL COMMUNICATIONS INFORMATION:

  NAME/AGENCY: {{ Name1 }}  ICS POSITION: {{ Position1 }}
  OFFICE PH: {{ OfficePhone1 }}  CELL PH: {{ CellPhone1 }}
  PAGER/RADIO: {{ PagerRadio1 }}  EMAIL: {{ Email1 }}

  NAME/AGENCY: {{ Name2 }}  ICS POSITION: {{ Position2 }}
  OFFICE PH: {{ OfficePhone2 }}  CELL PH: {{ CellPhone2 }}
  PAGER/RADIO: {{ PagerRadio2 }}  EMAIL: {{ Email2 }}

  NAME/AGENCY: {{ Name3 }}  ICS POSITION: {{ Position3 }}
  OFFICE PH: {{ OfficePhone3 }}  CELL PH: {{ CellPhone3 }}
  PAGER/RADIO: {{ PagerRadio3 }}  EMAIL: {{ Email3 }}

  NAME/AGENCY: {{ Name4 }}  ICS POSITION: {{ Position4 }}
  OFFICE PH: {{ OfficePhone4 }}  CELL PH: {{ CellPhone4 }}
  PAGER/RADIO: {{ PagerRadio4 }}  EMAIL: {{ Email4 }}

  NAME/AGENCY: {{ Name5 }}  ICS POSITION: {{ Position5 }}
  OFFICE PH: {{ OfficePhone5 }}  CELL PH: {{ CellPhone5 }}
  PAGER/RADIO: {{ PagerRadio5 }}  EMAIL: {{ Email5 }}

  NAME/AGENCY: {{ Name6 }}  ICS POSITION: {{ Position6 }}
  OFFICE PH: {{ OfficePhone6 }}  CELL PH: {{ CellPhone6 }}
  PAGER/RADIO: {{ PagerRadio6 }}  EMAIL: {{ Email6 }}

  NAME/AGENCY: {{ Name7 }}  ICS POSITION: {{ Position7 }}
  OFFICE PH: {{ OfficePhone7 }}  CELL PH: {{ CellPhone7 }}
  PAGER/RADIO: {{ PagerRadio7 }}  EMAIL: {{ Email7 }}

  NAME/AGENCY: {{ Name8 }}  ICS POSITION: {{ Position8 }}
  OFFICE PH: {{ OfficePhone8 }}  CELL PH: {{ CellPhone8 }}
  PAGER/RADIO: {{ PagerRadio8 }}  EMAIL: {{ Email8 }}

  --------------------------------------
  Prepared by: {{ PreparedName }}  Position/Title: {{ PreparedTitle }}
  Date/Time: {{ PreparedDateTime }}

fields:
  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimePrepared
    label: "2. Date/Time Prepared"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: DateFrom
    label: "3. Op Period - Date From"
    type: text
    required: true
    max_length: 12

