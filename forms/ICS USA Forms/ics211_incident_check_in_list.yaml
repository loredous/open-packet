    Agency: {{ Agency3 }}
    Kind: {{ Kind3 }}
    Type: {{ Type3 }}
    Resource Identifier: {{ ResourceID3 }}
    Home Base: {{ HomeBase3 }}
    Contact Info: {{ ContactInfo3 }}
    Assignment: {{ Assignment3 }}

  Entry 4:
    Name (Last, First): {{ Name4 }}
    Agency: {{ Agency4 }}
    Kind: {{ Kind4 }}
    Type: {{ Type4 }}
    Resource Identifier: {{ ResourceID4 }}
    Home Base: {{ HomeBase4 }}
    Contact Info: {{ ContactInfo4 }}
    Assignment: {{ Assignment4 }}

  Entry 5:
    Name (Last, First): {{ Name5 }}
    Agency: {{ Agency5 }}
    Kind: {{ Kind5 }}
    Type: {{ Type5 }}
    Resource Identifier: {{ ResourceID5 }}
    Home Base: {{ HomeBase5 }}
