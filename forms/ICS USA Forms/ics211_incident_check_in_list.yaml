  Entry 6:
    Name (Last, First): {{ Name6 }}
    Agency: {{ Agency6 }}
    Kind: {{ Kind6 }}
    Type: {{ Type6 }}
    Resource Identifier: {{ ResourceID6 }}
    Home Base: {{ HomeBase6 }}
    Contact Info: {{ ContactInfo6 }}
    Assignment: {{ Assignment6 }}

  Entry 7:
    Name (Last, First): {{ Name7 }}
    Agency: {{ Agency7 }}
    Kind: {{ Kind7 }}
    Type: {{ Type7 }}
    Resource Identifier: {{ ResourceID7 }}
    Home Base: {{ HomeBase7 }}
    Contact Info: {{ ContactInfo7 }}
    Assignment: {{ Assignment7 }}

  Entry 8:
    Name (Last, First): {{ Name8 }}
    Agency: {{ Agency8 }}
    Kind: {{ Kind8 }}
    Type: {{ Type8 }}
    Resource Identifier: {{ ResourceID8 }}
    Home Base: {{ HomeBase8 }}
    Contact Info: {{ ContactInfo8 }}
    Assignment: {{ Assignment8 }}

  -----------------------------------------------------------------------
  6. Prepared By: {{ PreparedBy }}
  7. Reviewed By: {{ ReviewedBy }}

