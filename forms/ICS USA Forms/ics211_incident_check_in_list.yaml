name: ICS 211 Incident Check-In List
category: ICS USA Forms
subject_template: "ICS 211 - {{ Incident_Name }} - {{ Date }}"
body_template: |
  ICS 211 INCIDENT CHECK-IN LIST

  1. Incident Name: {{ Incident_Name }}
  2. Incident Number: {{ Incident_Number }}
  3. Check-In Location: {{ CheckIn_Location }}
  4. Date: {{ Date }}
  5. Time: {{ Time }}

  -----------------------------------------------------------------------
  CHECK-IN ENTRIES:

  Entry 1:
    Name (Last, First): {{ Name1 }}
    Agency: {{ Agency1 }}
    Kind: {{ Kind1 }}
    Type: {{ Type1 }}
    Resource Identifier: {{ ResourceID1 }}
    Home Base: {{ HomeBase1 }}
    Contact Info: {{ ContactInfo1 }}
    Assignment: {{ Assignment1 }}

  Entry 2:
    Name (Last, First): {{ Name2 }}
    Agency: {{ Agency2 }}
    Kind: {{ Kind2 }}
