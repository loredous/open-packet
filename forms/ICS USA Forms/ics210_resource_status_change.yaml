name: ICS 210 Resource Status Change
category: ICS USA Forms
subject_template: "ICS 210 - {{ Incident_Name }} - {{ DateTime }}"
body_template: |
  ICS 210 RESOURCE STATUS CHANGE

  1. Incident Name: {{ Incident_Name }}
  2. Date/Time: {{ DateTime }}

  -----------------------------------------------------------------------
  3. RESOURCE STATUS CHANGE ENTRIES:

  Entry 1:
    Resource Name/ID: {{ ResourceName1 }}
    Kind/Type: {{ KindType1 }}
    Current Status: {{ CurrentStatus1 }}
    Current Location/Assignment: {{ CurrentLocation1 }}
    Change to Status: {{ NewStatus1 }}
    New Location/Assignment: {{ NewLocation1 }}
    Reason: {{ Reason1 }}

  Entry 2:
    Resource Name/ID: {{ ResourceName2 }}
    Kind/Type: {{ KindType2 }}
    Current Status: {{ CurrentStatus2 }}
    Current Location/Assignment: {{ CurrentLocation2 }}
    Change to Status: {{ NewStatus2 }}
    New Location/Assignment: {{ NewLocation2 }}
    Reason: {{ Reason2 }}

  Entry 3:
    Resource Name/ID: {{ ResourceName3 }}
    Kind/Type: {{ KindType3 }}
    Current Status: {{ CurrentStatus3 }}
    Current Location/Assignment: {{ CurrentLocation3 }}
    Change to Status: {{ NewStatus3 }}
    New Location/Assignment: {{ NewLocation3 }}
    Reason: {{ Reason3 }}

  Entry 4:
    Resource Name/ID: {{ ResourceName4 }}
    Kind/Type: {{ KindType4 }}
    Current Status: {{ CurrentStatus4 }}
    Current Location/Assignment: {{ CurrentLocation4 }}
    Change to Status: {{ NewStatus4 }}
    New Location/Assignment: {{ NewLocation4 }}
    Reason: {{ Reason4 }}

  Entry 5:
    Resource Name/ID: {{ ResourceName5 }}
    Kind/Type: {{ KindType5 }}
    Current Status: {{ CurrentStatus5 }}
    Current Location/Assignment: {{ CurrentLocation5 }}
    Change to Status: {{ NewStatus5 }}
    New Location/Assignment: {{ NewLocation5 }}
    Reason: {{ Reason5 }}

  -----------------------------------------------------------------------
  4. Requested By: {{ RequestedBy }}
  5. Prepared By: {{ PreparedBy }}

