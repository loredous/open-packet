name: ICS 207 Incident Organization Chart
category: ICS USA Forms
subject_template: "ICS 207 - {{ Incident_Name }} - {{ DateTimePrepared }}"
body_template: |
  ICS 207 INCIDENT ORGANIZATION CHART

  1. Incident Name: {{ Incident_Name }}
  2. Date/Time Prepared: {{ DateTimePrepared }}

  3. Operational Period:
  From: {{ DateFrom }} {{ TimeFrom }}
  To:   {{ DateTo }} {{ TimeTo }}

  ======================================================
  INCIDENT COMMANDER(S): {{ IC_Name }}
  Deputy IC: {{ Deputy_IC }}

  COMMAND STAFF:
  Safety Officer: {{ Safety_Officer }}
  Liaison Officer: {{ Liaison_Officer }}
  Public Info Officer: {{ PIO }}

  ======================================================
  OPERATIONS SECTION CHIEF: {{ Ops_Chief }}
  Deputy: {{ Ops_Deputy }}

  Branch I Director: {{ Branch1_Dir }}
  Branch I Div/Group: {{ Branch1_DivGroup }}

  Branch II Director: {{ Branch2_Dir }}
  Branch II Div/Group: {{ Branch2_DivGroup }}

  Branch III Director: {{ Branch3_Dir }}
  Branch III Div/Group: {{ Branch3_DivGroup }}

  Air Ops Branch Director: {{ AirOps_Dir }}
  Air Tactical Supervisor: {{ AirTac_Sup }}

  ======================================================
  PLANNING SECTION CHIEF: {{ Plan_Chief }}
  Deputy: {{ Plan_Deputy }}

  Resources Unit Leader: {{ Resources_UL }}
  Situation Unit Leader: {{ Situation_UL }}
  Documentation Unit Leader: {{ Docs_UL }}
  Demob Unit Leader: {{ Demob_UL }}
  Technical Specialists: {{ Tech_Specialists }}

  ======================================================
  LOGISTICS SECTION CHIEF: {{ Log_Chief }}
  Deputy: {{ Log_Deputy }}

  Support Branch Director: {{ Support_Dir }}
    Supply Unit Leader: {{ Supply_UL }}
    Facilities Unit Leader: {{ Facilities_UL }}
    Ground Support Unit Leader: {{ GroundSupport_UL }}

  Service Branch Director: {{ Service_Dir }}
    Communications Unit Leader: {{ Comms_UL }}
    Medical Unit Leader: {{ Medical_UL }}
    Food Unit Leader: {{ Food_UL }}

  ======================================================
  FINANCE/ADMIN SECTION CHIEF: {{ Finance_Chief }}
  Deputy: {{ Finance_Deputy }}

  Time Unit Leader: {{ Time_UL }}
  Procurement Unit Leader: {{ Procurement_UL }}
  Comp/Claims Unit Leader: {{ CompClaims_UL }}
  Cost Unit Leader: {{ Cost_UL }}

  ======================================================
  Prepared by: {{ PreparedName }}  Position/Title: {{ PreparedTitle }}
  Date/Time: {{ PreparedDateTime }}

  IAP Page: {{ IAP_Page }}

fields:
  - name: Incident_Name
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimePrepared
    label: "2. Date/Time Prepared"
    description: "e.g. 2025-01-15 1430"
    type: text
    required: true
    max_length: 20

  - name: DateFrom
    label: "3. Op Period - Date From"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "3. Op Period - Time From"
    type: text
    required: true
    max_length: 9

  - name: DateTo
    label: "3. Op Period - Date To"
    type: text
    required: true
    max_length: 12

  - name: TimeTo
    label: "3. Op Period - Time To"
    type: text
    required: true
    max_length: 9

  - name: IC_Name
    label: "Incident Commander(s)"
    type: text
    required: true
    max_length: 60

  - name: Deputy_IC
    label: "Deputy IC"
    type: text
    max_length: 40

  - name: Safety_Officer
