name: ICS 215 Operational Planning Worksheet
category: ICS USA Forms
subject_template: "ICS 215 - {{ Incident_Name }} - {{ DateTimeFrom }} to {{ DateTimeTo }}"
body_template: |
  ICS 215 OPERATIONAL PLANNING WORKSHEET

  1. Incident Name: {{ Incident_Name }}
  2. Operational Period:
     From: {{ DateTimeFrom }}
     To:   {{ DateTimeTo }}

  3. Branch: {{ Branch }}
  4. Division/Group: {{ Division_Group }}
  5. Operations Chief: {{ Ops_Chief }}

  -----------------------------------------------------------------------
  6. RESOURCES:

  Resource 1:
    Resource Identifier: {{ ResourceID1 }}
    Kind/Type: {{ KindType1 }}
    Required: {{ Required1 }}
    Have: {{ Have1 }}
    Need to Order: {{ NeedToOrder1 }}
    Reporting Location: {{ ReportingLocation1 }}
    Reporting Time: {{ ReportingTime1 }}

  Resource 2:
    Resource Identifier: {{ ResourceID2 }}
    Kind/Type: {{ KindType2 }}
    Required: {{ Required2 }}
    Have: {{ Have2 }}
    Need to Order: {{ NeedToOrder2 }}
    Reporting Location: {{ ReportingLocation2 }}
    Reporting Time: {{ ReportingTime2 }}

  Resource 3:
    Resource Identifier: {{ ResourceID3 }}
    Kind/Type: {{ KindType3 }}
    Required: {{ Required3 }}
    Have: {{ Have3 }}
    Need to Order: {{ NeedToOrder3 }}
    Reporting Location: {{ ReportingLocation3 }}
    Reporting Time: {{ ReportingTime3 }}

  Resource 4:
    Resource Identifier: {{ ResourceID4 }}
    Kind/Type: {{ KindType4 }}
    Required: {{ Required4 }}
    Have: {{ Have4 }}
    Need to Order: {{ NeedToOrder4 }}
    Reporting Location: {{ ReportingLocation4 }}
    Reporting Time: {{ ReportingTime4 }}

  Resource 5:
    Resource Identifier: {{ ResourceID5 }}
    Kind/Type: {{ KindType5 }}
    Required: {{ Required5 }}
    Have: {{ Have5 }}
    Need to Order: {{ NeedToOrder5 }}
    Reporting Location: {{ ReportingLocation5 }}
    Reporting Time: {{ ReportingTime5 }}

  -----------------------------------------------------------------------
  7. Work Assignment:
  {{ Work_Assignment }}

  8. Special Instructions:
  {{ Special_Instructions }}

  9. Communications (Voice/Data):
  {{ Communications }}

  -----------------------------------------------------------------------
  Prepared By: {{ PreparedBy }}

fields:
