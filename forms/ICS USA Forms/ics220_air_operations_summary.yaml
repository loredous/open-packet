name: ICS 220 Air Operations Summary
category: ICS USA Forms
subject_template: "ICS 220 - {{ IncidentName }} - {{ DateFrom }} {{ TimeFrom }}"
body_template: |
  AIR OPERATIONS SUMMARY (ICS 220)

  1. Incident Name: {{ IncidentName }}
  2. Operational Period:
     Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}

  3. Air Operations Branch Director: {{ AirOpsBranchDirector }}
     Air-to-Ground Frequency: {{ AirGroundFreq }}

  4. HELICOPTERS:

  Name/ID            Type   Model/Agency   Freq/Phone         Capacity        Assignment         ETA    ETD
  {{ Helo1Name }}    {{ Helo1Type }}  {{ Helo1Agency }}  {{ Helo1Freq }}  {{ Helo1Capacity }}  {{ Helo1Assignment }}  {{ Helo1ETA }}  {{ Helo1ETD }}
  {{ Helo2Name }}    {{ Helo2Type }}  {{ Helo2Agency }}  {{ Helo2Freq }}  {{ Helo2Capacity }}  {{ Helo2Assignment }}  {{ Helo2ETA }}  {{ Helo2ETD }}
  {{ Helo3Name }}    {{ Helo3Type }}  {{ Helo3Agency }}  {{ Helo3Freq }}  {{ Helo3Capacity }}  {{ Helo3Assignment }}  {{ Helo3ETA }}  {{ Helo3ETD }}
  {{ Helo4Name }}    {{ Helo4Type }}  {{ Helo4Agency }}  {{ Helo4Freq }}  {{ Helo4Capacity }}  {{ Helo4Assignment }}  {{ Helo4ETA }}  {{ Helo4ETD }}
  {{ Helo5Name }}    {{ Helo5Type }}  {{ Helo5Agency }}  {{ Helo5Freq }}  {{ Helo5Capacity }}  {{ Helo5Assignment }}  {{ Helo5ETA }}  {{ Helo5ETD }}

  5. FIXED WING:

  Name/ID            Type   Model/Agency   Freq/Phone         Capacity        Assignment         ETA    ETD
  {{ FW1Name }}    {{ FW1Type }}  {{ FW1Agency }}  {{ FW1Freq }}  {{ FW1Capacity }}  {{ FW1Assignment }}  {{ FW1ETA }}  {{ FW1ETD }}
  {{ FW2Name }}    {{ FW2Type }}  {{ FW2Agency }}  {{ FW2Freq }}  {{ FW2Capacity }}  {{ FW2Assignment }}  {{ FW2ETA }}  {{ FW2ETD }}
  {{ FW3Name }}    {{ FW3Type }}  {{ FW3Agency }}  {{ FW3Freq }}  {{ FW3Capacity }}  {{ FW3Assignment }}  {{ FW3ETA }}  {{ FW3ETD }}
  {{ FW4Name }}    {{ FW4Type }}  {{ FW4Agency }}  {{ FW4Freq }}  {{ FW4Capacity }}  {{ FW4Assignment }}  {{ FW4ETA }}  {{ FW4ETD }}
  {{ FW5Name }}    {{ FW5Type }}  {{ FW5Agency }}  {{ FW5Freq }}  {{ FW5Capacity }}  {{ FW5Assignment }}  {{ FW5ETA }}  {{ FW5ETD }}

  6. Remarks/Special Instructions:
  {{ Remarks }}

  Prepared by: {{ PreparedBy }}
  Position/Title: {{ PrepPosition }}
  Date/Time: {{ PrepDateTime }}

fields:
  - name: IncidentName
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateFrom
    label: "2. Operational Period - Date From"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "2. Operational Period - Date To"
    description: "e.g. 2025-01-15"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "2. Operational Period - Time From"
    description: "e.g. 0800"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "2. Operational Period - Time To"
    description: "e.g. 2000"
    type: text
    required: true
    max_length: 9

  - name: AirOpsBranchDirector
    label: "3. Air Operations Branch Director"
    type: text
    required: true
    max_length: 40

  - name: AirGroundFreq
    label: "3. Air-to-Ground Frequency"
    description: "Frequency or channel name for air-to-ground communications"
    type: text
    max_length: 20

  - name: Helo1Name
    label: "4. Helicopter 1 - Name/ID"
