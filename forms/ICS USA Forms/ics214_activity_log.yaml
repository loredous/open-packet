name: ICS 214 Activity Log
category: ICS USA Forms
subject_template: "ICS 214 - {{ Incident_Name }} - {{ Name }} - {{ DateTimeFrom }} to {{ DateTimeTo }}"
body_template: |
  ICS 214 ACTIVITY LOG

  1. Incident or Event Name: {{ Incident_Name }}
  2. Operational Period:
     From: {{ DateTimeFrom }}
     To:   {{ DateTimeTo }}

  3. Name: {{ Name }}
  4. ICS Position: {{ ICS_Position }}
  5. Home Agency & Unit: {{ Home_Agency }}

  ----------------------------------------------
  6. RESOURCES ASSIGNED:

  NAME                 ICS POSITION         HOME AGENCY
  {{ Name1 }}          {{ ICS_Position1 }}  {{ Home_Agency1 }}
  {{ Name2 }}          {{ ICS_Position2 }}  {{ Home_Agency2 }}
  {{ Name3 }}          {{ ICS_Position3 }}  {{ Home_Agency3 }}
  {{ Name4 }}          {{ ICS_Position4 }}  {{ Home_Agency4 }}
  {{ Name5 }}          {{ ICS_Position5 }}  {{ Home_Agency5 }}

  ----------------------------------------------
  7. ACTIVITY LOG OF NOTABLE EVENTS:

  DATE & TIME              ACTIVITY
  {{ ActivityDateTime1 }}  {{ Activities1 }}
  {{ ActivityDateTime2 }}  {{ Activities2 }}
  {{ ActivityDateTime3 }}  {{ Activities3 }}
  {{ ActivityDateTime4 }}  {{ Activities4 }}
  {{ ActivityDateTime5 }}  {{ Activities5 }}
  {{ ActivityDateTime6 }}  {{ Activities6 }}
  {{ ActivityDateTime7 }}  {{ Activities7 }}
  {{ ActivityDateTime8 }}  {{ Activities8 }}
  {{ ActivityDateTime9 }}  {{ Activities9 }}
  {{ ActivityDateTime10 }} {{ Activities10 }}

  ---------------------------------------------
  Prepared by: {{ PreparedName }}

fields:
  - name: Incident_Name
    label: "1. Incident or Event Name"
    type: text
    required: true
    max_length: 60

  - name: DateTimeFrom
    label: "2. Operational Period - From"
    description: "e.g. 2025-01-15 0800"
    type: text
    required: true
    max_length: 20

  - name: DateTimeTo
    label: "2. Operational Period - To"
    description: "e.g. 2025-01-15 2000"
    type: text
    required: true
    max_length: 20

  - name: Name
    label: "3. Name"
    type: text
    required: true
    max_length: 40

  - name: ICS_Position
    label: "4. ICS Position"
    type: text
    required: true
    max_length: 40

  - name: Home_Agency
    label: "5. Home Agency & Unit"
    type: text
