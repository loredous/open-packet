name: ICS 203 Organization Assignment List
category: ICS USA Forms
subject_template: "ICS 203 - {{ IncidentName }} - {{ DateFrom }} {{ TimeFrom }}"
body_template: |
  ORGANIZATION ASSIGNMENT LIST (ICS 203)

  1. Incident Name: {{ IncidentName }}
  2. Operational Period:
     Date From: {{ DateFrom }}  Date To: {{ DateTo }}
     Time From: {{ TimeFrom }}  Time To: {{ TimeTo }}

  3. INCIDENT COMMAND AND STAFF:
  Incident Commander(s): {{ IC }}
  Deputy: {{ ICDeputy }}
  Safety Officer: {{ SafetyOfficer }}
  Public Information Officer: {{ PIO }}
  Liaison Officer: {{ LiaisonOfficer }}

  4. AGENCY/ORGANIZATION REPRESENTATIVES:
  Agency/Organization: {{ Agency1 }}  Name: {{ AgencyRep1 }}
  Agency/Organization: {{ Agency2 }}  Name: {{ AgencyRep2 }}
  Agency/Organization: {{ Agency3 }}  Name: {{ AgencyRep3 }}

  5. PLANNING SECTION:
  Chief: {{ PlanningChief }}
  Deputy: {{ PlanningDeputy }}
  Resources Unit: {{ ResourcesUnit }}
  Situation Unit: {{ SituationUnit }}
  Documentation Unit: {{ DocumentationUnit }}
  Demobilization Unit: {{ DemobUnit }}

  6. LOGISTICS SECTION:
  Chief: {{ LogisticsChief }}
  Deputy: {{ LogisticsDeputy }}
  Support Branch Director: {{ SupportBranchDir }}
  Supply Unit: {{ SupplyUnit }}
  Facilities Unit: {{ FacilitiesUnit }}
  Ground Support Unit: {{ GroundSupportUnit }}
  Service Branch Director: {{ ServiceBranchDir }}
  Communications Unit: {{ CommsUnit }}
  Medical Unit: {{ MedicalUnit }}
  Food Unit: {{ FoodUnit }}

  7. OPERATIONS SECTION:
  Chief: {{ OpsChief }}
  Deputy: {{ OpsDeputy }}
  Branch I Director: {{ Branch1Dir }}
  Branch II Director: {{ Branch2Dir }}
  Branch III Director: {{ Branch3Dir }}

  8. FINANCE/ADMINISTRATION SECTION:
  Chief: {{ FinanceChief }}
  Deputy: {{ FinanceDeputy }}
  Time Unit: {{ TimeUnit }}
  Procurement Unit: {{ ProcurementUnit }}
  Compensation/Claims Unit: {{ CompClaimsUnit }}
  Cost Unit: {{ CostUnit }}

  9. Prepared by: {{ PreparedBy }}
  Position/Title: {{ PrepPosition }}
  Date/Time: {{ PrepDateTime }}

fields:
  - name: IncidentName
    label: "1. Incident Name"
    type: text
    required: true
    max_length: 60

  - name: DateFrom
    label: "2. Operational Period - Date From"
    type: text
    required: true
    max_length: 12

  - name: DateTo
    label: "2. Operational Period - Date To"
    type: text
    required: true
    max_length: 12

  - name: TimeFrom
    label: "2. Operational Period - Time From"
    type: text
    required: true
    max_length: 9

  - name: TimeTo
    label: "2. Operational Period - Time To"
    type: text
    required: true
    max_length: 9

  - name: IC
    label: "3. Incident Commander(s)"
    type: text
    required: true
